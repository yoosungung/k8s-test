# Grants Hermes enough Kubernetes operator permissions for day-to-day operations
# from the in-cluster ServiceAccount used by hermes-master.
#
# Scope note:
# - Monitoring uses wildcard read rules so new CRDs/API groups are covered
#   without editing this file on every deploy.
# - Mutating permissions stay explicit (least privilege) per resource type.
# - It does NOT grant RBAC write permissions, so Hermes cannot grant itself
#   or others additional privileges.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hermes-k8s-operator
  labels:
    app.kubernetes.io/name: hermes-k8s-operator
    app.kubernetes.io/part-of: k8s-test
rules:
  # Cluster-wide monitoring: covers all current and future API groups/CRDs.
  # Subresources (pods/log, nodes/proxy, …) still need explicit rules below.
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]

  # Subresources not matched by the resource wildcard above.
  - apiGroups: [""]
    resources:
      - pods/log
    verbs: ["get"]

  # Kubelet read-only stats endpoints for disk/PVC usage and DiskPressure checks.
  - apiGroups: [""]
    resources:
      - nodes/proxy
      - nodes/stats
      - nodes/metrics
    verbs: ["get"]

  # API discovery (`kubectl api-resources`, OpenAPI schema, health probes).
  - nonResourceURLs:
      - /api
      - /api/*
      - /apis
      - /apis/*
      - /healthz
      - /livez
      - /readyz
      - /openapi
      - /openapi/*
      - /version
      - /version/
    verbs: ["get"]

  # Storage operations: PV/PVC troubleshooting, resizing, reclaim policy/finalizer
  # fixes, manual bind/rebind workflows, and cleanup.
  - apiGroups: [""]
    resources:
      - persistentvolumes
      - persistentvolumeclaims
    verbs: ["create", "patch", "update", "delete"]

  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
      - volumeattachments
    verbs: ["create", "patch", "update", "delete"]

  - apiGroups: ["snapshot.storage.k8s.io"]
    resources:
      - volumesnapshots
      - volumesnapshotcontents
    verbs: ["create", "patch", "update", "delete"]

  # Application operations: restart/scale/patch workloads, update services and
  # ingress routes, run one-off jobs, and repair config needed by workloads.
  - apiGroups: [""]
    resources:
      - configmaps
      - secrets
      - services
      - endpoints
    verbs: ["create", "patch", "update", "delete"]

  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["create", "patch", "update", "delete"]

  - apiGroups: ["apps"]
    resources:
      - deployments/scale
      - replicasets/scale
      - statefulsets/scale
    verbs: ["get", "patch", "update"]

  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["create", "patch", "update", "delete"]

  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["create", "patch", "update", "delete"]

  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["create", "patch", "update", "delete"]

  - apiGroups: ["policy"]
    resources:
      - poddisruptionbudgets
    verbs: ["create", "patch", "update", "delete"]

  # NebulaGraph operator CRs (cluster recovery, spec updates, teardown helpers).
  - apiGroups: ["apps.nebula-graph.io"]
    resources:
      - nebulaclusters
      - nebularestores
      - nebulabackups
      - nebulacronbackups
    verbs: ["patch", "update", "delete"]

  # Opik ClickHouse operator CRs (reconcile/restart after storage or config fixes).
  - apiGroups: ["clickhouse.altinity.com", "clickhouse-keeper.altinity.com"]
    resources:
      - clickhouseinstallations
      - clickhousekeeperinstallations
    verbs: ["patch", "update"]

  # Runtime operations: exec/port-forward for debugging, pod deletion/eviction for
  # stuck workloads, and node patching for cordon/uncordon or label/taint fixes.
  - apiGroups: [""]
    resources:
      - pods
    verbs: ["delete", "patch", "update"]

  - apiGroups: [""]
    resources:
      - pods/exec
      - pods/portforward
    verbs: ["create"]

  - apiGroups: ["policy"]
    resources:
      - pods/eviction
    verbs: ["create"]

  - apiGroups: [""]
    resources:
      - nodes
    verbs: ["patch", "update"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hermes-k8s-operator
  labels:
    app.kubernetes.io/name: hermes-k8s-operator
    app.kubernetes.io/part-of: k8s-test
subjects:
  - kind: ServiceAccount
    name: hermes-master-sa
    namespace: ai-agents
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: hermes-k8s-operator
