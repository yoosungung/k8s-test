# One-off in-cluster build for git-http-server:local (k3s nodes without Docker).
# Apply: kubectl apply -f manifests/apps/git-http-server-image-build-job.yaml
# Import runs in the same pod after kaniko writes the tar to hostPath.
apiVersion: batch/v1
kind: Job
metadata:
  name: build-git-http-server-image
  namespace: git
  labels:
    app.kubernetes.io/name: git-http-server-image-build
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: git-http-server-image-build
    spec:
      nodeName: didim-gpu
      restartPolicy: Never
      initContainers:
        - name: kaniko
          image: gcr.io/kaniko-project/executor:v1.23.2
          args:
            - --dockerfile=/workspace/Dockerfile
            - --context=dir:///workspace
            - --destination=git-http-server:local
            - --no-push
            - --tar-path=/out/git-http-server-local.tar
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: out
              mountPath: /out
      containers:
        - name: import
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              test -s /out/git-http-server-local.tar
              chroot /host k3s ctr images rm docker.io/library/git-http-server:local 2>/dev/null || true
              chroot /host sh -c 'k3s ctr images import -' < /out/git-http-server-local.tar
              chroot /host k3s ctr images ls | grep -F git-http-server
          securityContext:
            privileged: true
          volumeMounts:
            - name: out
              mountPath: /out
            - name: host
              mountPath: /host
      volumes:
        - name: workspace
          configMap:
            name: git-http-server-docker
        - name: out
          emptyDir: {}
        - name: host
          hostPath:
            path: /
