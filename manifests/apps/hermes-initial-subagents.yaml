# ==============================================================================
# 4. K8S MANAGER SUBAGENT (RBAC + Deployment)
# ==============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hermes-k8s-manager-sa
  namespace: ai-agents
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hermes-k8s-manager-role
rules:
  - apiGroups: ["", "apps", "batch", "extensions"]
    resources:
      - pods
      - pods/log
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
      - jobs
      - cronjobs
      - services
      - endpoints
      - namespaces
      - configmaps
      - persistentvolumeclaims
      - events
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hermes-k8s-manager-binding
subjects:
  - kind: ServiceAccount
    name: hermes-k8s-manager-sa
    namespace: ai-agents
roleRef:
  kind: ClusterRole
  name: hermes-k8s-manager-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-subagent-k8s
