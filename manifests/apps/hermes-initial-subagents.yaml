# Hermes Initial Subagents
# Uses official image ENTRYPOINT (/opt/hermes/docker/entrypoint.sh)
# Each subagent runs "gateway run" with API server enabled
# so master can call each subagent over in-cluster HTTP.
#
# 1. Coder  2. Wiki Writer  3. Web Searcher  4. k8s Manager

# ==============================================================================
# COMMON ENV TEMPLATE (applied to each subagent below)
# - HERMES_HOME=/opt/data  (matches VOLUME in Dockerfile)
# - HERMES_INFERENCE_MODEL / PROVIDER=custom + CUSTOM_BASE_URL → OpenAI API
# - DB_CONNECTION_STRING → shared PostgreSQL (hermesdb)
# ==============================================================================

# ==============================================================================
# 1. CODER SUBAGENT
# ==============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-subagent-coder
  namespace: ai-agents
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-subagent-coder
  namespace: ai-agents
  labels:
    app.kubernetes.io/name: hermes-subagent-coder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes-subagent-coder
  template:
    metadata:
      labels:
        app: hermes-subagent-coder
    spec:
      initContainers:
        - name: bootstrap-model-config
          image: nousresearch/hermes-agent:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "/scripts/bootstrap-model.sh"]
          env:
            - name: HERMES_HOME
              value: "/opt/data"
            - name: HERMES_INFERENCE_MODEL
              value: "gpt-5.4-mini"
            - name: HERMES_INFERENCE_PROVIDER
              value: "custom"
            - name: CUSTOM_BASE_URL
              value: "https://api.openai.com/v1"
          volumeMounts:
            - name: subagent-data
              mountPath: /opt/data
            - name: bootstrap-scripts
              mountPath: /scripts
              readOnly: true
      containers:
        - name: hermes-subagent
          image: nousresearch/hermes-agent:latest
          imagePullPolicy: IfNotPresent
          args: ["gateway", "run"]
          env:
            - name: HERMES_HOME
              value: "/opt/data"
            - name: HERMES_INFERENCE_MODEL
              value: "gpt-5.4-mini"
            - name: HERMES_INFERENCE_PROVIDER
              value: "custom"
            - name: CUSTOM_BASE_URL
              value: "https://api.openai.com/v1"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-gateway-secrets
                  key: OPENAI_API_KEY
            - name: HERMES_PROFILE
              value: "coder"
            - name: DB_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: hermes-gateway-secrets
                  key: DB_CONNECTION_STRING
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: API_SERVER_PORT
              value: "8000"
            - name: API_SERVER_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-gateway-secrets
                  key: HERMES_API_SERVER_KEY
          volumeMounts:
            - name: subagent-data
              mountPath: /opt/data
            - name: shared-workspace
              mountPath: /workspace/shared
      volumes:
        - name: bootstrap-scripts
          configMap:
            name: hermes-bootstrap-model
            defaultMode: 0755
        - name: subagent-data
          persistentVolumeClaim:
            claimName: pvc-subagent-coder
        - name: shared-workspace
          persistentVolumeClaim:
            claimName: pvc-shared-workspace
---
apiVersion: v1
kind: Service
metadata:
  name: hermes-subagent-coder
  namespace: ai-agents
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: hermes-subagent-coder
---
