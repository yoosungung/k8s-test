# Shared ingress-nginx routes (host *.k8s-test; external HTTPS on node :443).
# TLS: mkcert wildcard → scripts/sync-k8s-test-tls-secret.sh → ingress-nginx/k8s-test-tls
# Map hosts in /etc/hosts, e.g.:
#   <NODE_IP>  opik.k8s-test hermes.k8s-test hermes-api.k8s-test sglang.k8s-test embeddings.k8s-test leantime.k8s-test git.k8s-test
#
# Qdrant / NebulaGraph Studio ingress: path-graph deploy/k8s/infra/manifests/ingress-routes.yaml
#
# Git HTTP is defined in helm/charts/git-http-server (host git.k8s-test).

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: opik-frontend
  namespace: opik
  labels:
    app.kubernetes.io/name: opik
    app.kubernetes.io/component: ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: opik.k8s-test
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: opik-frontend
                port:
                  number: 5173

