# Hermes Master Agent - StatefulSet + Service
# gateway + dashboard run via official ENTRYPOINT (/opt/hermes/docker/entrypoint.sh)
# HERMES_DASHBOARD=1 activates the background dashboard automatically
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hermes-master-sa
  namespace: ai-agents
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hermes-master
  namespace: ai-agents
  labels:
    app.kubernetes.io/name: hermes-master
spec:
  serviceName: "hermes-master"
  replicas: 1
  selector:
    matchLabels:
      app: hermes-master
  template:
    metadata:
      labels:
        app: hermes-master
    spec:
      serviceAccountName: hermes-master-sa
      # Hermes runs as UID 10000; hostPath shared workspace must be group-writable.
      securityContext:
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: fix-shared-workspace-perms
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              chown -R 10000:10000 /workspace/shared
              chmod 2775 /workspace/shared
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: shared-workspace
              mountPath: /workspace/shared
        # Hermes gateway runs as UID 10000; fix root-owned files from prior root exec / init.
        - name: fix-hermes-home-perms
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              chown -R 10000:10000 /opt/data
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: master-data
              mountPath: /opt/data
        - name: bootstrap-model-config
          image: nousresearch/hermes-agent:latest
          imagePullPolicy: Always
          command: ["/bin/bash", "/scripts/bootstrap-model.sh"]
          securityContext:
            runAsUser: 10000
            runAsGroup: 10000
          env:
            - name: HERMES_HOME
              value: "/opt/data"
            - name: HERMES_INFERENCE_MODEL
              value: "gpt-5.5"
            - name: HERMES_INFERENCE_PROVIDER
              value: "openai-codex"
            - name: CUSTOM_BASE_URL
              value: ""
          volumeMounts:
            - name: master-data
              mountPath: /opt/data
            - name: bootstrap-scripts
              mountPath: /scripts
              readOnly: true
      containers:
        - name: hermes-master
          image: nousresearch/hermes-agent:latest
          imagePullPolicy: Always
          args: ["gateway", "run"]
          ports:
            - containerPort: 8642
              name: api
            - containerPort: 9119
              name: dashboard
          env:
            # Data directory (matches VOLUME in Dockerfile)
            - name: HERMES_HOME
              value: "/opt/data"
            # Automatically start the dashboard as a background side-process
            - name: HERMES_DASHBOARD
              value: "1"
            - name: HERMES_DASHBOARD_HOST
              value: "0.0.0.0"
            - name: HERMES_DASHBOARD_PORT
              value: "9119"
            # Expose API server for internal agent-to-agent communication
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: API_SERVER_PORT
              value: "8642"
            - name: API_SERVER_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-gateway-secrets
                  key: HERMES_API_SERVER_KEY
            # LLM inference via OpenAI Codex
            - name: HERMES_INFERENCE_MODEL
              value: "gpt-5.5"
            - name: HERMES_INFERENCE_PROVIDER
              value: "openai-codex"
            - name: CUSTOM_BASE_URL
              value: ""
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-gateway-secrets
                  key: OPENAI_API_KEY
            # Discord gateway
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hermes-gateway-secrets
                  key: DISCORD_BOT_TOKEN
            - name: DISCORD_ALLOWED_USERS
              valueFrom:
                secretKeyRef:
                  name: hermes-gateway-secrets
                  key: DISCORD_ALLOWED_USERS
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hermes-gateway-secrets
                  key: GITHUB_TOKEN
            - name: NAVER_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: hermes-gateway-secrets
                  key: NAVER_CLIENT_ID
            - name: NAVER_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: hermes-gateway-secrets
                  key: NAVER_CLIENT_SECRET
            - name: LINEAR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-gateway-secrets
                  key: LINEAR_API_KEY
            # Session/memory: SQLite under HERMES_HOME (/opt/data/state.db), not PostgreSQL
            # In-cluster subagent endpoints (OpenAI-compatible Hermes API)
            - name: SUBAGENT_CODER_URL
              value: "http://hermes-subagent-coder.ai-agents.svc.cluster.local:8000/v1"
            - name: SUBAGENT_WIKI_URL
              value: "http://hermes-subagent-wiki.ai-agents.svc.cluster.local:8000/v1"
            - name: SUBAGENT_SEARCHER_URL
              value: "http://hermes-subagent-searcher.ai-agents.svc.cluster.local:8000/v1"
            - name: SUBAGENT_K8S_URL
              value: "http://hermes-subagent-k8s.ai-agents.svc.cluster.local:8000/v1"
          volumeMounts:
            - name: master-data
              mountPath: /opt/data
            - name: shared-workspace
              mountPath: /workspace/shared
            - name: hermes-auth-volume
              mountPath: /opt/data/auth.json
              subPath: auth.json
            - name: bootstrap-scripts
              mountPath: /etc/cont-init.d/99-patch-openai.sh
              subPath: patch-openai.sh
      volumes:
        - name: bootstrap-scripts
          configMap:
            name: hermes-bootstrap-model
            defaultMode: 0755
        - name: shared-workspace
          persistentVolumeClaim:
            claimName: pvc-shared-workspace
        - name: hermes-auth-volume
          secret:
            secretName: hermes-auth-secrets
            optional: true
  volumeClaimTemplates:
    - metadata:
        name: master-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: hermes-master
  namespace: ai-agents
  labels:
    app.kubernetes.io/name: hermes-master
spec:
  ports:
    - port: 8642
      targetPort: 8642
      name: api
    - port: 9119
      targetPort: 9119
      name: dashboard
  selector:
    app: hermes-master
  type: ClusterIP
