# ConfigMap: seed model.provider/base_url/default from env before entrypoint runs
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-bootstrap-model
  namespace: ai-agents
data:
  bootstrap-model.sh: |
    #!/bin/bash
    set -euo pipefail
    HERMES_HOME="${HERMES_HOME:-/opt/data}"
    INSTALL_DIR="/opt/hermes"
    mkdir -p "${HERMES_HOME}"
    if [ ! -f "${HERMES_HOME}/config.yaml" ]; then
      cp "${INSTALL_DIR}/cli-config.yaml.example" "${HERMES_HOME}/config.yaml"
    fi
    # Create .profile for hermes user to load container environment variables
    cat << 'EOF' > "${HERMES_HOME}/.profile"
    if [ -d /run/s6/container_environment ]; then
      for env_file in /run/s6/container_environment/*; do
        if [ -f "$env_file" ]; then
          env_name=$(basename "$env_file")
          case "$env_name" in
            HOME|USER|LOGNAME|SHELL|MAIL|PWD)
              ;;
            *)
              export "$env_name"="$(cat "$env_file")"
              ;;
          esac
        fi
      done
    fi
    EOF
    source "${INSTALL_DIR}/.venv/bin/activate"
    python3 - <<'PY'
    import os
    import yaml
    import json
    from pathlib import Path

    home = Path(os.environ["HERMES_HOME"])
    path = home / "config.yaml"
    cfg = yaml.safe_load(path.read_text())
    cfg = cfg if isinstance(cfg, dict) else {}

    model = cfg.get("model")
    if not isinstance(model, dict):
        model = {}
    cfg["model"] = model
    model["default"] = os.environ["HERMES_INFERENCE_MODEL"]
    model["provider"] = os.environ["HERMES_INFERENCE_PROVIDER"]
    base_url = os.environ.get("CUSTOM_BASE_URL", "")
    if base_url:
        model["base_url"] = base_url
    else:
        model.pop("base_url", None)
    model.pop("context_length", None)
    model.pop("api_key", None)

    terminal = cfg.get("terminal")
    if not isinstance(terminal, dict):
        terminal = {}
    cfg["terminal"] = terminal
    passthrough = terminal.get("env_passthrough")
    if not isinstance(passthrough, list):
        passthrough = []
    terminal["env_passthrough"] = passthrough
    for var in ["GITHUB_TOKEN", "OPENAI_API_KEY", "LINEAR_API_KEY", "NAVER_CLIENT_ID", "NAVER_CLIENT_SECRET", "HF_TOKEN"]:
        if var not in passthrough:
            passthrough.append(var)

    path.write_text(
        yaml.dump(cfg, default_flow_style=False, sort_keys=False, allow_unicode=True)
    )
    print(yaml.dump({"model": model}, default_flow_style=False))

    # Force gateway_state.json to running state on every boot
    state_path = home / "gateway_state.json"
    state = {}
    if state_path.exists():
        try:
            state = json.loads(state_path.read_text())
            if not isinstance(state, dict):
                state = {}
        except Exception:
            pass
    state["gateway_state"] = "running"
    state_path.write_text(json.dumps(state))
    PY
  patch-openai.sh: |
    #!/bin/bash
    set -euo pipefail
    echo "Checking for OpenAI SDK responses.py to patch..."
    TARGET_FILE=$(find /opt/hermes/.venv/lib -name "_responses.py" -path "*/openai/lib/_parsing/*" | head -n 1)
    if [ -n "${TARGET_FILE}" ] && [ -f "${TARGET_FILE}" ]; then
        echo "Patching ${TARGET_FILE}..."
        sed -i 's/for output in response\.output:/for output in (response.output or []):/g' "${TARGET_FILE}"
        echo "Patch applied successfully."
    else
        echo "OpenAI SDK responses.py not found or already patched."
    fi
# Secret hermes-gateway-secrets is created by scripts/deploy.sh (see hermes-gateway-secrets.yaml)
---
# PersistentVolume: host-level shared workspace (single-node: didim-gpu)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-shared-workspace
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /agent_shared_workspace
    type: DirectoryOrCreate
---
# PersistentVolumeClaim: shared workspace for all agents
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-shared-workspace
  namespace: ai-agents
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 20Gi
  volumeName: pv-shared-workspace
  storageClassName: ""
