# Placeholder Secret for Hermes gateway (applied only when deploy.sh cannot
# create hermes-gateway-secrets from env vars or interactive prompts).
# Prefer: export DISCORD_BOT_TOKEN, OPENAI_API_KEY, HERMES_API_SERVER_KEY,
# NAVER_CLIENT_ID, NAVER_CLIENT_SECRET, HERMES_DASHBOARD_BASIC_AUTH_* 
# before running ./scripts/deploy.sh
apiVersion: v1
kind: Secret
metadata:
  name: hermes-gateway-secrets
  namespace: ai-agents
type: Opaque
stringData:
  DISCORD_BOT_TOKEN: "REPLACE_WITH_DISCORD_BOT_TOKEN"
  DISCORD_ALLOWED_USERS: "ericberryking"
  OPENAI_API_KEY: "REPLACE_WITH_OPENAI_API_KEY"
  HERMES_API_SERVER_KEY: "REPLACE_WITH_HERMES_API_SERVER_KEY_MIN_8_CHARS"
  GITHUB_TOKEN: "REPLACE_WITH_GITHUB_TOKEN"
  LINEAR_API_KEY: "REPLACE_WITH_LINEAR_API_KEY"
  NAVER_CLIENT_ID: "REPLACE_WITH_NAVER_CLIENT_ID"
  NAVER_CLIENT_SECRET: "REPLACE_WITH_NAVER_CLIENT_SECRET"
  HF_TOKEN: "REPLACE_WITH_HF_TOKEN"
  # Required for dashboard on 0.0.0.0 (HERMES_DASHBOARD_INSECURE is ignored since June 2026)
  HERMES_DASHBOARD_BASIC_AUTH_USERNAME: "admin"
  HERMES_DASHBOARD_BASIC_AUTH_PASSWORD: "REPLACE_WITH_HERMES_DASHBOARD_PASSWORD"
  HERMES_DASHBOARD_BASIC_AUTH_SECRET: "REPLACE_WITH_HERMES_DASHBOARD_SECRET_OPENSSL_RAND_BASE64_32"
