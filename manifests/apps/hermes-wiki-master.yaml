# Hermes Wiki Master Agent - standalone agent with dashboard-only external access
# Runs gateway without Discord/Linear; dashboard exposed via fixed NodePort
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hermes-wiki-master-sa
  namespace: ai-agents
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hermes-wiki-master
  namespace: ai-agents
  labels:
    app.kubernetes.io/name: hermes-wiki-master
spec:
  serviceName: "hermes-wiki-master"
  replicas: 1
  selector:
    matchLabels:
      app: hermes-wiki-master
  template:
    metadata:
      labels:
        app: hermes-wiki-master
    spec:
      serviceAccountName: hermes-wiki-master-sa
      securityContext:
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: fix-shared-workspace-perms
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              chown -R 10000:10000 /workspace/shared
              chmod 2775 /workspace/shared
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: shared-workspace
              mountPath: /workspace/shared
        # Hermes gateway runs as UID 10000; fix root-owned files from prior root exec / init.
        - name: fix-hermes-home-perms
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              chown -R 10000:10000 /opt/data
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: wiki-master-data
              mountPath: /opt/data
        - name: bootstrap-model-config
          image: nousresearch/hermes-agent:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "/scripts/bootstrap-model.sh"]
          securityContext:
            runAsUser: 10000
            runAsGroup: 10000
          env:
            - name: HERMES_HOME
              value: "/opt/data"
            - name: HERMES_INFERENCE_MODEL
              value: "gpt-5.5"
            - name: HERMES_INFERENCE_PROVIDER
              value: "openai-codex"
            - name: CUSTOM_BASE_URL
              value: ""
          volumeMounts:
            - name: wiki-master-data
              mountPath: /opt/data
            - name: bootstrap-scripts
              mountPath: /scripts
              readOnly: true
      containers:
        - name: hermes-wiki-master
          image: nousresearch/hermes-agent:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "-c"]
          args:
            - |
              /etc/cont-init.d/99-patch-openai.sh || true
              exec /opt/hermes/docker/entrypoint.sh gateway run
          ports:
            - containerPort: 9119
              name: dashboard
          env:
            - name: HERMES_HOME
              value: "/opt/data"
            - name: HERMES_DASHBOARD
              value: "1"
            - name: HERMES_DASHBOARD_HOST
              value: "0.0.0.0"
            - name: HERMES_DASHBOARD_PORT
              value: "9119"
            # Required when binding dashboard to non-loopback without OAuth provider
            - name: HERMES_DASHBOARD_INSECURE
              value: "1"
            - name: HERMES_INFERENCE_MODEL
              value: "gpt-5.5"
            - name: HERMES_INFERENCE_PROVIDER
              value: "openai-codex"
            - name: CUSTOM_BASE_URL
              value: ""
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-gateway-secrets
                  key: OPENAI_API_KEY
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hermes-gateway-secrets
                  key: GITHUB_TOKEN
            - name: NAVER_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: hermes-gateway-secrets
                  key: NAVER_CLIENT_ID
            - name: NAVER_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: hermes-gateway-secrets
                  key: NAVER_CLIENT_SECRET
          volumeMounts:
            - name: wiki-master-data
              mountPath: /opt/data
            - name: shared-workspace
              mountPath: /workspace/shared
            - name: hermes-auth-volume
              mountPath: /opt/data/auth.json
              subPath: auth.json
            - name: bootstrap-scripts
              mountPath: /etc/cont-init.d/99-patch-openai.sh
              subPath: patch-openai.sh
      volumes:
        - name: bootstrap-scripts
          configMap:
            name: hermes-bootstrap-model
            defaultMode: 0755
        - name: shared-workspace
          persistentVolumeClaim:
            claimName: pvc-shared-workspace
        - name: hermes-auth-volume
          secret:
            secretName: hermes-auth-secrets
            optional: true
  volumeClaimTemplates:
    - metadata:
        name: wiki-master-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: hermes-wiki-master
  namespace: ai-agents
  labels:
    app.kubernetes.io/name: hermes-wiki-master
spec:
  type: NodePort
  ports:
    - port: 9119
      targetPort: 9119
      nodePort: 30119
      name: dashboard
  selector:
    app: hermes-wiki-master
