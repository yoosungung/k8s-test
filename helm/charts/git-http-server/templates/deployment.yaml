apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "git-http-server.fullname" . }}
  namespace: {{ include "git-http-server.namespace" . }}
  labels:
    {{- include "git-http-server.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "git-http-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "git-http-server.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: git-http-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            {{- if .Values.persistence.enabled }}
            - name: git-repos
              mountPath: {{ .Values.git.projectRoot }}
            {{- end }}
            {{- if .Values.auth.enabled }}
            - name: git-auth
              mountPath: /etc/nginx/git.htpasswd
              subPath: {{ .Values.auth.secretKey }}
              readOnly: true
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "git-http-server.fullname" . }}-nginx
        {{- if .Values.persistence.enabled }}
        - name: git-repos
          persistentVolumeClaim:
            claimName: {{ include "git-http-server.fullname" . }}-repos
        {{- end }}
        {{- if .Values.auth.enabled }}
        - name: git-auth
          secret:
            secretName: {{ include "git-http-server.authSecretName" . }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
