# Helm Values for Bitnami PostgreSQL Deployment in Test Environment
# Recommended chart version: 18.6.x (PostgreSQL 18.4.0)

# Hermes discovers :5432 via scripts/sync-hermes-pg-registry.sh; writable config is opt-in.
commonLabels:
  k8s-test.io/postgres-instance: "true"
  k8s-test.io/hermes-pg-config: "true"

auth:
  # Enable admin user remote access
  enablePostgresUser: true
  postgresPassword: "adminpassword"

  # Custom database and user setup
  database: "hermesdb"
  username: "hermes"
  password: "hermespassword"

primary:
  service:
    type: ClusterIP

  # Resource configurations tailored for lightweight local test environments
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

  # Persistent Volume configurations
  persistence:
    enabled: true
    # Will use the default StorageClass defined in the cluster
    # storageClass: ""
    size: 8Gi
    accessModes:
      - ReadWriteOnce

  # Enable pgvector in hermesdb during first cluster initialization.
  # Note: initdb scripts run only when the data directory is empty.
  initdb:
    scripts:
      01-enable-pgvector.sql: |
        \connect hermesdb;
        CREATE EXTENSION IF NOT EXISTS vector;
