# Shared cluster Ingress controller (test / bare-metal).
# External HTTP apps use https://<app>.k8s-test/ on node :443 (mkcert wildcard TLS).
# PostgreSQL: TCP stream on controller :5432, exposed on host :5432.
# Qdrant gRPC :6334 TCP passthrough (REST/UI: HTTPS Ingress on :443; path-graph repo).

tcp:
  5432: "postgres/postgresql:5432"
  6334: "qdrant/qdrant:6334"

controller:
  # hostPort binds node ports; RollingUpdate cannot schedule a second pod on one node.
  updateStrategy:
    type: Recreate
    rollingUpdate: null

  ingressClassResource:
    name: nginx
    enabled: true
    default: true

  # Bind HTTP/HTTPS on the node at the standard ports (not NodePort 30080/30443).
  hostPort:
    enabled: true
    ports:
      http: 80
      https: 443

  service:
    type: ClusterIP

  # Wildcard mkcert cert (scripts/sync-k8s-test-tls-secret.sh → secret k8s-test-tls).
  extraArgs:
    default-ssl-certificate: "ingress-nginx/k8s-test-tls"

  config:
    use-forwarded-headers: "true"
    compute-full-forwarded-for: "true"
    ssl-redirect: "true"
    force-ssl-redirect: "true"

  metrics:
    enabled: false

  # Avoid pre-upgrade hook jobs on flaky test clusters; Ingress still works without validation.
  admissionWebhooks:
    enabled: false
