# NebulaGraph cluster — single-node test (didim-gpu, SC local-path)
# Chart: nebula-operator/nebula-cluster 1.8.0, NebulaGraph v3.8.0
# Docs: https://docs.nebula-graph.io/3.8.0/k8s-operator/2.get-started/2.3.create-cluster/

nameOverride: nebula

nebula:
  version: v3.8.0
  storageClassName: local-path
  topologySpreadConstraints:
    - topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway

  coredumpPreservation:
    enable: false

  graphd:
    replicas: 1
    serviceType: NodePort
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    logVolume:
      enable: true
      storage: 500Mi

  metad:
    replicas: 1
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    logVolume:
      enable: true
      storage: 500Mi
    dataVolume:
      storage: 2Gi

  storaged:
    replicas: 1
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    logVolume:
      enable: true
      storage: 500Mi
    dataVolumes:
      - storage: 5Gi

  console:
    username: root
    password: nebula
